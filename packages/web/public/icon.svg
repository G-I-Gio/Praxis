<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Praxis - symbole P stylisé</title>
  <desc id="desc">Symbole vectoriel Praxis avec carré arrondi bleu, accent vert et lettre P blanche stylisée.</desc>
  <defs>
    <style>
      .blue { fill: #2C5698; }
      .green { fill: #57B093; }
      .white { fill: #FFFFFF; }
    </style>
  </defs>

  <!-- Fond du symbole -->
  <rect class="blue" x="8" y="8" width="240" height="240" rx="52" ry="52"/>

  <!-- Accent dynamique -->
  <path class="green" d="M160 8H248V96L96 248H8V160L160 8Z" opacity="0.98"/>

  <!-- P stylisé en réserve -->
  <path class="white" fill-rule="evenodd" d="
    M64 50
    H132
    C176 50 206 77 206 118
    C206 159 176 186 132 186
    H108
    V214
    H64
    Z

    M108 88
    V148
    H128
    C149 148 162 137 162 118
    C162 99 149 88 128 88
    Z
  "/>
</svg>
