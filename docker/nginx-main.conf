# Config principale nginx — remplace /etc/nginx/nginx.conf
# Logs vers /tmp/nginx pour éviter les problèmes de permissions sur /dev/stderr

pid /tmp/nginx/run/nginx.pid;
error_log /tmp/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Format JSON pour l'access log — directement parseable sans post-traitement
    log_format json_access escape=json
        '{"ts":"$time_iso8601",'
        '"level":"info",'
        '"source":"nginx_access",'
        '"msg":"$request_method $request_uri $status",'
        '"ctx":{'
            '"ip":"$realip_remote_addr",'
            '"proxy_ip":"$remote_addr",'
            '"method":"$request_method",'
            '"path":"$request_uri",'
            '"status":$status,'
            '"bytes":$body_bytes_sent,'
            '"duration_ms":$request_time,'
            '"referer":"$http_referer",'
            '"ua":"$http_user_agent"'
        '}}';

    access_log  /tmp/nginx/access.log json_access;
    error_log   /tmp/nginx/error.log warn;

    client_body_temp_path   /tmp/nginx/client_body;
    proxy_temp_path         /tmp/nginx/proxy;
    fastcgi_temp_path       /tmp/nginx/fastcgi;
    uwsgi_temp_path         /tmp/nginx/uwsgi;
    scgi_temp_path          /tmp/nginx/scgi;

    sendfile        on;
    keepalive_timeout 65;

    include /etc/nginx/http.d/*.conf;
}
