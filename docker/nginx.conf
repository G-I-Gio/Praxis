# Vhost Praxis — configuration du serveur HTTP
# Les directives globales (pid, logs) sont dans /etc/nginx/nginx.conf

upstream backend {
    server 127.0.0.1:3001;
    keepalive 32;
}

# ── Real IP — proxies de confiance ───────────────────────────────────────────
# Le nginx interne fait toujours confiance à lui-même (loopback)
set_real_ip_from 127.0.0.1;
set_real_ip_from ::1;
# Les plages KNOWN_PROXIES sont injectées ici par entrypoint.sh
# KNOWN_PROXIES_PLACEHOLDER
real_ip_header    X-Forwarded-For;
real_ip_recursive on;

server {
    listen 3000;

    root /app/web;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /branding/ {
        alias /app/config/branding/;
    }

    # Médias quiz — accès depuis parties actives (gameId validé par Node)
    location /media/ {
        client_max_body_size 0;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $realip_remote_addr;
        proxy_set_header X-Forwarded-For   $http_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        # Support Range requests pour lecture vidéo/audio
        proxy_set_header Range             $http_range;
        proxy_set_header If-Range          $http_if_range;
        proxy_no_cache 1;
    }

    # WebSocket
    location /ws {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $realip_remote_addr;
        proxy_set_header X-Forwarded-For   $http_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Healthcheck
    location /health {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $realip_remote_addr;
        proxy_set_header X-Forwarded-For   $http_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # API HTTP auth
    location /auth/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $realip_remote_addr;
        proxy_set_header X-Forwarded-For   $http_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Upload médias — streaming direct vers Node sans buffering nginx
    # proxy_request_buffering off est indispensable : busboy lit req en streaming,
    # si nginx bufferise le body avant de le transmettre le stream est épuisé à l'arrivée
    location /api/media/upload {
        client_max_body_size 0;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $realip_remote_addr;
        proxy_set_header X-Forwarded-For   $http_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_request_buffering off;
        proxy_buffering         off;
    }

    # Upload branding — streaming direct (même raison)
    location /api/branding/upload {
        client_max_body_size 0;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $realip_remote_addr;
        proxy_set_header X-Forwarded-For   $http_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_request_buffering off;
        proxy_buffering         off;
    }

    # API REST (quizzes, managers, media…)
    location /api/ {
        client_max_body_size 20m;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $realip_remote_addr;
        proxy_set_header X-Forwarded-For   $http_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
}
